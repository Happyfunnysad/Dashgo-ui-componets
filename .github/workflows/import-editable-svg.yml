name: Import editable SVG package

on:
  push:
    paths:
      - '_import/editable-svg-source.tar.gz.b64'
      - '.github/workflows/import-editable-svg.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import-svg:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Extract editable SVG source package
        run: |
          mkdir -p editable-svg
          base64 --decode _import/editable-svg-source.tar.gz.b64 > /tmp/editable-svg-source.tar.gz
          tar -xzf /tmp/editable-svg-source.tar.gz -C editable-svg
          rm -rf _import
      - name: Commit extracted SVG sources
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add editable-svg .github/workflows/import-editable-svg.yml _import || true
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "feat: add source-verified editable SVG frames"
          git push
